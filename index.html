<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourLibrary - Books & Dramas Log</title>
  <meta name="description" content="A private, beautiful web app to log and review your books and drama logs. Track metrics and save history safely in your browser.">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
  <!-- Decorative Ambient Gradients -->
  <div class="ambient-glow bg-violet"></div>
  <div class="ambient-glow bg-rose"></div>

  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-area">
        <div class="logo-icon">
          <i class="fa-solid fa-bookmark"></i>
        </div>
        <div class="logo-text">
          <h1>YourLibrary</h1>
          <p class="subtitle">My Books & Dramas Log</p>
        </div>
      </div>
      
      <div class="header-actions">
        <button id="export-btn" class="btn btn-secondary" title="Export Library Backup">
          <i class="fa-solid fa-file-export"></i> <span>Export</span>
        </button>
        <button id="import-btn" class="btn btn-secondary" title="Import Library Backup">
          <i class="fa-solid fa-file-import"></i> <span>Import</span>
        </button>
        <input type="file" id="import-file-input" accept=".json" style="display: none;">
        
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
          <i class="fa-solid fa-sun"></i>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="app-main">
      
      <!-- Stats Dashboard -->
      <section class="stats-section" aria-label="Dashboard Statistics">
        <div class="stat-card">
          <div class="stat-icon icon-blue">
            <i class="fa-solid fa-cubes"></i>
          </div>
          <div class="stat-details">
            <span class="stat-value" id="stat-total">0</span>
            <span class="stat-label">Total Items</span>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon icon-violet">
            <i class="fa-solid fa-book"></i>
          </div>
          <div class="stat-details">
            <span class="stat-value" id="stat-books">0</span>
            <span class="stat-label">Books Logged</span>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon icon-rose">
            <i class="fa-solid fa-tv"></i>
          </div>
          <div class="stat-details">
            <span class="stat-value" id="stat-dramas">0</span>
            <span class="stat-label">Dramas Logged</span>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon icon-amber">
            <i class="fa-solid fa-star"></i>
          </div>
          <div class="stat-details">
            <span class="stat-value" id="stat-rating">0.0</span>
            <span class="stat-label">Average Rating</span>
          </div>
        </div>
      </section>

      <!-- Controls & Filter Section -->
      <section class="controls-section">
        <div class="search-bar">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
          <input type="text" id="search-input" placeholder="Search by title, author, or director...">
        </div>
        
        <div class="filters-row">
          <!-- Type Filter Tabs -->
          <div class="filter-tabs">
            <button class="tab-btn active" data-type="all">All</button>
            <button class="tab-btn" data-type="book"><i class="fa-solid fa-book-open"></i> Books</button>
            <button class="tab-btn" data-type="drama"><i class="fa-solid fa-video"></i> Dramas</button>
          </div>
          
          <div class="filter-dropdowns">
            <!-- Status Filter -->
            <div class="select-wrapper">
              <select id="status-filter" aria-label="Filter by Status">
                <option value="all">All Statuses</option>
                <option value="planning">Plan to Read/Watch</option>
                <option value="reading">In Progress</option>
                <option value="completed">Completed</option>
              </select>
              <i class="fa-solid fa-chevron-down select-icon"></i>
            </div>
            
            <!-- Sort Selector -->
            <div class="select-wrapper">
              <select id="sort-selector" aria-label="Sort Order">
                <option value="newest">Newest Added</option>
                <option value="oldest">Oldest Added</option>
                <option value="rating-desc">Highest Rated</option>
                <option value="rating-asc">Lowest Rated</option>
                <option value="title">Title (A-Z)</option>
              </select>
              <i class="fa-solid fa-sort select-icon"></i>
            </div>
          </div>

          <!-- Add Button -->
          <button id="add-item-btn" class="btn btn-primary">
            <i class="fa-solid fa-plus"></i> <span>Add to Library</span>
          </button>
        </div>
      </section>

      <!-- Items Grid -->
      <section class="items-grid-section">
        <div class="items-grid" id="items-grid">
          <!-- Dynamically populated via JS -->
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">
            <i class="fa-regular fa-folder-open"></i>
          </div>
          <h3>Your library is empty</h3>
          <p>Start recording your favorite books and dramas to build your private collection!</p>
          <button id="empty-add-btn" class="btn btn-primary">
            <i class="fa-solid fa-plus"></i> <span>Add Your First Item</span>
          </button>
        </div>
      </section>

    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <p>&copy; 2026 YourLibrary. Private & Beautiful Media Logger.</p>
    </footer>
  </div>

  <!-- Add / Edit Modal -->
  <div class="modal-overlay" id="item-modal">
    <div class="modal-container">
      <div class="modal-header">
        <h2 id="modal-title">Record Media</h2>
        <button class="modal-close-btn" id="modal-close-btn" aria-label="Close Modal">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      
      <form id="item-form" class="modal-form">
        <input type="hidden" id="item-id">
        
        <div class="form-row">
          <div class="form-group flex-2">
            <label for="form-title">Title <span class="required">*</span></label>
            <input type="text" id="form-title" placeholder="e.g., Norwegian Wood, Stranger Things" required>
          </div>
          
          <div class="form-group flex-1">
            <label for="form-type">Category <span class="required">*</span></label>
            <div class="select-wrapper">
              <select id="form-type" required>
                <option value="book">Book</option>
                <option value="drama">Drama</option>
              </select>
              <i class="fa-solid fa-chevron-down select-icon"></i>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="form-creator" id="creator-label">Author <span class="required">*</span></label>
            <input type="text" id="form-creator" placeholder="e.g., Haruki Murakami, The Duffer Brothers" required>
          </div>
          
          <div class="form-group">
            <label for="form-status">Status <span class="required">*</span></label>
            <div class="select-wrapper">
              <select id="form-status" required>
                <option value="planning">Plan to Read/Watch</option>
                <option value="reading">In Progress</option>
                <option value="completed">Completed</option>
              </select>
              <i class="fa-solid fa-chevron-down select-icon"></i>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Rating (1-5 Stars)</label>
            <div class="star-rating-input">
              <input type="radio" id="star5" name="rating" value="5"><label for="star5" title="5 Stars"><i class="fa-solid fa-star"></i></label>
              <input type="radio" id="star4" name="rating" value="4"><label for="star4" title="4 Stars"><i class="fa-solid fa-star"></i></label>
              <input type="radio" id="star3" name="rating" value="3"><label for="star3" title="3 Stars"><i class="fa-solid fa-star"></i></label>
              <input type="radio" id="star2" name="rating" value="2"><label for="star2" title="2 Stars"><i class="fa-solid fa-star"></i></label>
              <input type="radio" id="star1" name="rating" value="1"><label for="star1" title="1 Star"><i class="fa-solid fa-star"></i></label>
            </div>
          </div>

          <div class="form-group">
            <label for="form-cover">Cover Image URL (Optional)</label>
            <input type="url" id="form-cover" placeholder="https://example.com/cover.jpg">
          </div>
        </div>

        <div class="form-row dates-row">
          <div class="form-group">
            <label for="form-start-date">Start Date</label>
            <input type="date" id="form-start-date">
          </div>
          
          <div class="form-group">
            <label for="form-end-date">End Date</label>
            <input type="date" id="form-end-date">
          </div>
        </div>

        <div class="form-group">
          <label for="form-notes">Personal Review / Notes</label>
          <textarea id="form-notes" rows="4" placeholder="Write your thoughts, reviews, or private notes about this work..."></textarea>
        </div>

        <div class="form-actions">
          <button type="button" id="form-delete-btn" class="btn btn-danger btn-left" style="display: none;">
            <i class="fa-solid fa-trash-can"></i> Delete
          </button>
          <button type="button" id="form-cancel-btn" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Record</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Notification Toast -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Custom Javascript -->
  <script src="app.js"></script>
</body>
</html>
